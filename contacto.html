<!-- EMAILJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
(function(){
  emailjs.init("YTBxrRU17QlmMZ0BG"); // 
})();
</script>

<script>
const contactForm = document.getElementById('contact-form');
const submitBtn = document.getElementById('submit-btn');
const btnText = document.getElementById('btn-text');
const btnLoader = document.getElementById('btn-loader');
const formContent = document.getElementById('form-content');
const successScreen = document.getElementById('success-screen');

contactForm.addEventListener('submit', function(e) {
    e.preventDefault();

    // 🔒 Validación básica
    if (!contactForm.email.value.includes("@")) {
        alert("Correo inválido");
        return;
    }

    submitBtn.disabled = true;
    btnText.textContent = "Enviando...";
    btnLoader.classList.remove('hidden');

    emailjs.send("service_ocaw127", "template_2q8vjdu", {
        name: contactForm.name.value,
        phone: contactForm.phone.value,
        email: contactForm.email.value,
        product: contactForm.product.value,
        message: contactForm.message.value
    })
    .then(() => {
        showSuccess();
    })
    .catch((error) => {
        console.error("EmailJS error:", error);
        btnText.textContent = "Error al enviar";
        submitBtn.disabled = false;
        btnLoader.classList.add('hidden');

        setTimeout(() => {
            btnText.textContent = "Reintentar";
        }, 3000);
    });
});

function showSuccess() {
    formContent.classList.add('opacity-0', 'scale-95');

    setTimeout(() => {
        formContent.classList.add('hidden');
        successScreen.classList.remove('hidden');
    }, 500);
}
</script>
